<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS Conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F5F5;
      color: #111;
      font-size: 14px;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      background: #fff;
    }

    /* ── TOP HEADER ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 64px;
      background: #fff;
      border-bottom: 1px solid #EBEBEB;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: #1A73E8; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 15px;
      font-weight: 600; flex-shrink: 0;
    }
    .contact-info .cname { font-size: 15px; font-weight: 600; color: #111; line-height: 1.2; }
    .contact-info .cphone { font-size: 12px; color: #888; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px; border: none; background: transparent;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; color: #555; font-size: 18px;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: #F0F0F0; }
    .live-dot-wrap {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500; color: #34A853;
      background: #E8F5E9; padding: 4px 10px; border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px; background: #34A853;
      border-radius: 50%; animation: livepulse 2s ease-in-out infinite;
    }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── MESSAGES ── */
    .messages-wrap {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px 16px 8px; display: flex; flex-direction: column;
      gap: 2px; background: #F9F9F9; min-height: 0;
    }
    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .divider { display: flex; align-items: center; gap: 8px; margin: 12px 0 6px; }
    .divider-line { flex: 1; height: 1px; background: #E0E0E0; }
    .divider-label { font-size: 11px; color: #aaa; font-weight: 500; white-space: nowrap; }
    .msg-row { display: flex; margin-bottom: 2px; animation: pop 0.18s ease; }
    @keyframes pop { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.outbound { justify-content: flex-start; }
    .msg-row.outbound .bubble { background: #fff; border: 1px solid #E8E8E8; border-bottom-left-radius: 4px; color: #111; }
    .msg-row.inbound { justify-content: flex-end; }
    .msg-row.inbound .bubble { background: #1A73E8; border-bottom-right-radius: 4px; color: #fff; }
    .msg-row.sending { justify-content: flex-start; opacity: 0.6; }
    .msg-row.sending .bubble { background: #fff; border: 1px dashed #ccc; border-bottom-left-radius: 4px; color: #999; }
    .bubble { max-width: 70%; padding: 8px 12px 6px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .b-from { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; opacity: 0.5; }
    .b-text { white-space: pre-wrap; word-break: break-word; }
    .b-time { font-size: 10px; opacity: 0.45; margin-top: 4px; }
    .msg-row.outbound .b-time, .msg-row.sending .b-time { text-align: left; }
    .msg-row.inbound .b-time { text-align: right; }
    .state-box {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 40px 20px; text-align: center;
    }
    .state-icon { font-size: 32px; }
    .state-box h3 { font-size: 15px; font-weight: 600; color: #444; }
    .state-box p  { font-size: 13px; color: #999; max-width: 220px; }
    .big-spin {
      width: 28px; height: 28px;
      border: 2.5px solid #E0E0E0; border-top-color: #1A73E8;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── AUTH GATE ── */
    .auth-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 32px;
    }
    .auth-gate .gate-icon { font-size: 48px; }
    .auth-gate h2 { font-size: 18px; font-weight: 600; color: #111; }
    .auth-gate p  { font-size: 14px; color: #888; max-width: 260px; line-height: 1.6; }
    .auth-gate .gate-spin {
      width: 32px; height: 32px;
      border: 3px solid #E0E0E0; border-top-color: #1A73E8;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* ── STATUS BAR ── */
    .status-bar { flex-shrink: 0; min-height: 0; padding: 0 16px; }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 8px; font-size: 12px;
      font-weight: 500; margin: 4px 0; animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .status-pill.success { background: #E8F5E9; color: #2E7D32; }
    .status-pill.error   { background: #FCE8E6; color: #C62828; }

    /* ── BOTTOM INPUT BAR ── */
    .input-bar {
      flex-shrink: 0; display: flex; align-items: flex-end;
      gap: 8px; padding: 10px 12px; background: #fff;
      border-top: 1px solid #EBEBEB;
    }
    .input-bar textarea {
      flex: 1; resize: none; border: 1px solid #E0E0E0;
      border-radius: 22px; padding: 10px 16px;
      font-family: 'Inter', sans-serif; font-size: 14px;
      line-height: 1.5; color: #111; background: #F7F7F7;
      outline: none; max-height: 120px; min-height: 40px;
      overflow-y: auto; transition: border-color 0.15s, background 0.15s;
    }
    .input-bar textarea::placeholder { color: #aaa; }
    .input-bar textarea:focus { border-color: #1A73E8; background: #fff; }
    .send-btn {
      flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%;
      background: #1A73E8; border: none; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
      transition: background 0.15s, transform 0.1s; color: #fff;
    }
    .send-btn:hover:not(:disabled) { background: #1558B0; }
    .send-btn:active:not(:disabled) { transform: scale(0.94); }
    .send-btn:disabled { background: #B0C8F5; cursor: not-allowed; }
    .send-icon { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .spin-sm { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    .char-hint { font-size: 10px; color: #bbb; text-align: right; padding: 0 16px 4px; flex-shrink: 0; }
    .char-hint.warn   { color: #F59E0B; }
    .char-hint.danger { color: #DC2626; font-weight: 600; }
  </style>
</head>
<body>

<!-- ── AUTH GATE OVERLAY (shown while verifying) ── -->
<div class="auth-gate" id="authGate">
  <div class="gate-spin"></div>
  <h2>Verifying session…</h2>
  <p>Please wait while we confirm your login.</p>
</div>

<div class="app" id="appShell" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="avatarEl">?</div>
      <div class="contact-info">
        <div class="cname"  id="rname">Customer</div>
        <div class="cphone" id="rphone"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-dot-wrap"><span class="live-dot"></span>Live</div>
      <button type="button" class="icon-btn" onclick="event.preventDefault();loadMessages();" title="Refresh">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button type="button" class="icon-btn" onclick="event.preventDefault();history.back();" title="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages-wrap" id="msgScroll">
    <div class="state-box">
      <div class="big-spin"></div>
      <p>Loading conversation…</p>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-bar" id="statusArea"></div>

  <!-- CHAR HINT -->
  <div class="char-hint" id="charHint"></div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <textarea id="msgInput" placeholder="Type a message…" maxlength="1600" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendSMS()">
      <span id="sendIcon">
        <svg class="send-icon" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </span>
    </button>
  </div>

</div><!-- /.app -->

// ── Helpers ───────────────────────────────────────────────
let apiMessages  = [];
let pendingLocal = [];
let isFirstLoad  = true;
let isLoading    = false;

function authHeaders(extra = {}) {
  return { 'Authorization': `Bearer ${token}`, ...extra };
}

function fmtPhone(p) {
  const c = p.replace(/\D/g, '');
  return c.length === 10 ? `(${c.substr(0,3)}) ${c.substr(3,3)}-${c.substr(6,4)}` : p;
}

function fmtTime(ts) {
  if (!ts) return '';
  const d    = new Date(ts), now = new Date();
  const days = Math.floor((now - d) / 86400000);
  const t    = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (days === 0) return t;
  if (days === 1) return 'Yesterday · ' + t;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' · ' + t;
}

function fmtDateLabel(ts) {
  const d    = new Date(ts), now = new Date();
  const days = Math.floor((now - d) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function esc(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function nearBottom() {
  const el = document.getElementById('msgScroll');
  return (el.scrollHeight - el.scrollTop - el.clientHeight) < 120;
}

function scrollDown() {
  const el = document.getElementById('msgScroll');
  el.scrollTop = el.scrollHeight;
}

function render() {
  const scroll  = document.getElementById('msgScroll');
  const wasNear = nearBottom();
  scroll.innerHTML = '';

  const confirmedTexts = new Set(apiMessages.map(m => m.text.trim()));
  const visiblePending = pendingLocal.filter(p => !confirmedTexts.has(p.text.trim()));
  const combined = [...apiMessages, ...visiblePending]
    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

  if (!combined.length) {
    scroll.innerHTML = `
      <div class="state-box">
        <div class="state-icon">💬</div>
        <h3>No messages yet</h3>
        <p>Send the first message to start the conversation</p>
      </div>`;
    return;
  }

  let lastLabel = '';
  combined.forEach(msg => {
    const label = fmtDateLabel(msg.timestamp);
    if (label !== lastLabel) {
      lastLabel = label;
      const div = document.createElement('div');
      div.className = 'divider';
      div.innerHTML = `<div class="divider-line"></div><span class="divider-label">${label}</span><div class="divider-line"></div>`;
      scroll.appendChild(div);
    }
    const row    = document.createElement('div');
    const cls    = msg.source === 'local' ? 'sending' : msg.direction;
    row.className = `msg-row ${cls}`;
    const sender  = msg.direction === 'outbound' || msg.source === 'local' ? 'You' : name;
    row.innerHTML = `
      <div class="bubble">
        <div class="b-from">${esc(sender)}</div>
        <div class="b-text">${esc(msg.text)}</div>
        <div class="b-time">${msg.source === 'local' ? 'Sending…' : fmtTime(msg.timestamp)}</div>
      </div>`;
    scroll.appendChild(row);
  });

  if (wasNear || isFirstLoad) scrollDown();
}

async function loadMessages() {
  if (isLoading || !phone) return;
  isLoading = true;
  try {
    // ✅ Token passed in Authorization header
    const res  = await fetch('/api/sms/history/' + phone, {
      headers: authHeaders()
    });
    const data = await res.json();

    if (data.success && data.messages) {
      const newSig = data.messages.map(m => m.id + m.direction + m.text).join('|');
      const oldSig = apiMessages.map(m => m.id + m.direction + m.text).join('|');
      if (newSig !== oldSig || isFirstLoad) {
        apiMessages = data.messages;
        render();
      }
    } else if (isFirstLoad) {
      document.getElementById('msgScroll').innerHTML = `
        <div class="state-box">
          <div class="state-icon">💬</div>
          <h3>No messages yet</h3>
          <p>Send the first message to start the conversation</p>
        </div>`;
    }
    isFirstLoad = false;
  } catch (err) {
    console.error(err);
    if (isFirstLoad) {
      document.getElementById('msgScroll').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <h3>Unable to load</h3>
          <p>Check your connection and try again</p>
        </div>`;
    }
  } finally {
    isLoading = false;
  }
}

async function sendSMS() {

  const msg  = msgInput.value.trim();
  const btn  = document.getElementById('sendBtn');
  const icon = document.getElementById('sendIcon');

    direction: 'outbound',
    source:    'local'
  };

}

}
